name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -p pkv-sync-server -- -D warnings

      - name: Test
        run: cargo test -p pkv-sync-server

      - name: Install cargo-tarpaulin
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-tarpaulin --locked

      - name: Rust coverage
        if: matrix.os == 'ubuntu-latest'
        run: cargo tarpaulin -p pkv-sync-server --out Json --output-dir target/tarpaulin

      - name: Upload Rust coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: target/tarpaulin/tarpaulin-report.json

  plugin:
    name: Plugin checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install plugin dependencies
        run: npm ci --prefix plugin

      - name: Plugin coverage
        run: npm --prefix plugin test -- --coverage

      - name: Upload plugin coverage
        uses: actions/upload-artifact@v4
        with:
          name: plugin-coverage
          path: plugin/coverage/coverage-summary.json

      - name: Typecheck plugin
        run: npm --prefix plugin run typecheck

      - name: Package plugin
        run: npm --prefix plugin run package

      - name: Audit plugin dependencies
        run: npm audit --prefix plugin --audit-level=moderate

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pkv-sync:test .

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs:
      - rust
      - plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Rust coverage
        uses: actions/download-artifact@v4
        with:
          name: rust-coverage
          path: coverage-input/rust

      - name: Download plugin coverage
        uses: actions/download-artifact@v4
        with:
          name: plugin-coverage
          path: coverage-input/plugin

      - name: Check coverage
        run: |
          python scripts/coverage_gate.py \
            --baseline public-docs/COVERAGE.md \
            --tarpaulin-json coverage-input/rust/tarpaulin-report.json \
            --plugin-summary coverage-input/plugin/coverage-summary.json \
            --max-drop 5.0

  release-smoke:
    name: Release binary smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p pkv-sync-server

      - name: Smoke test release binary
        shell: pwsh
        run: ./scripts/ci-smoke.ps1
