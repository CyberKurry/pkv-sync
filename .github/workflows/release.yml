name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CROSS_VERSION: "0.2.5"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -p pkv-sync-server -- -D warnings

      - name: Test
        run: cargo test -p pkv-sync-server

  build-linux:
    name: Linux binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        run: cargo install cross --version "$CROSS_VERSION" --locked

      - name: Build release binary
        run: cross build --release -p pkv-sync-server --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pkvsyncd dist/pkvsyncd-${{ matrix.target }}

      - name: Smoke test release binary
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: ./dist/pkvsyncd-${{ matrix.target }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkvsyncd-${{ matrix.target }}
          path: dist/*

  build-windows:
    name: Windows binary (x86_64-pc-windows-msvc)
    runs-on: windows-latest
    needs: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p pkv-sync-server

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/pkvsyncd.exe dist/pkvsyncd-x86_64-pc-windows-msvc.exe

      - name: Smoke test release binary
        shell: pwsh
        run: .\dist\pkvsyncd-x86_64-pc-windows-msvc.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkvsyncd-x86_64-pc-windows-msvc
          path: dist/*

  plugin:
    name: Obsidian plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install plugin dependencies
        run: npm ci --prefix plugin

      - name: Test plugin
        run: npm --prefix plugin test

      - name: Typecheck plugin
        run: npm --prefix plugin run typecheck

      - name: Package plugin
        run: npm --prefix plugin run package

      - name: Audit plugin dependencies
        run: npm audit --prefix plugin --audit-level=moderate

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkv-sync-plugin
          path: plugin/pkv-sync-plugin.zip

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          pattern: pkvsyncd-*-unknown-linux-gnu
          path: dist/linux
          merge-multiple: true

      - name: Download plugin package
        uses: actions/download-artifact@v4
        with:
          name: pkv-sync-plugin
          path: dist/plugin

      - name: Prepare Docker release context
        shell: bash
        run: |
          mkdir -p docker-release/bin/amd64 docker-release/bin/arm64 docker-release/plugin
          cp dist/linux/pkvsyncd-x86_64-unknown-linux-gnu docker-release/bin/amd64/pkvsyncd
          cp dist/linux/pkvsyncd-aarch64-unknown-linux-gnu docker-release/bin/arm64/pkvsyncd
          chmod +x docker-release/bin/amd64/pkvsyncd docker-release/bin/arm64/pkvsyncd
          unzip -q dist/plugin/pkv-sync-plugin.zip -d docker-release/plugin
          cp Dockerfile.release docker-release/Dockerfile
          test -f docker-release/plugin/main.js
          test -f docker-release/plugin/manifest.json
          test -f docker-release/plugin/styles.css

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 smoke image
        uses: docker/build-push-action@v5
        with:
          context: docker-release
          file: docker-release/Dockerfile
          load: true
          platforms: linux/amd64
          tags: pkv-sync:smoke-amd64

      - name: Smoke test amd64 image
        run: docker run --rm --platform linux/amd64 pkv-sync:smoke-amd64 --version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: docker-release
          file: docker-release/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - rust
      - build-linux
      - build-windows
      - plugin
      - docker

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          find . -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed -E 's#  \./(.*/)?#  #' > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true

  plugin-mirror:
    name: Plugin store mirror
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plugin package
        uses: actions/download-artifact@v4
        with:
          name: pkv-sync-plugin
          path: mirror-input

      - name: Assemble mirror content
        id: assemble
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          unzip -q mirror-input/pkv-sync-plugin.zip -d mirror-input/unpacked
          MANIFEST_VERSION="$(jq -r .version mirror-input/unpacked/manifest.json)"
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "manifest version $MANIFEST_VERSION does not match tag version $VERSION" >&2
            exit 1
          fi
          mkdir -p mirror-content
          cp mirror-input/unpacked/main.js mirror-input/unpacked/manifest.json mirror-input/unpacked/styles.css mirror-content/
          cp plugin/versions.json mirror-content/versions.json
          cp plugin/store/README.md mirror-content/README.md
          cp plugin/store/README.zh-CN.md mirror-content/README.zh-CN.md
          cp LICENSE mirror-content/LICENSE
          cp -r plugin/src mirror-content/src
          cp -r plugin/tests mirror-content/tests
          cp plugin/esbuild.config.mjs plugin/package.json plugin/package-lock.json plugin/release.mjs plugin/tsconfig.json plugin/vitest.config.mts mirror-content/
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to mirror repository
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_MIRROR_TOKEN }}
          VERSION: ${{ steps.assemble.outputs.version }}
          MIRROR_REPO: CyberKurry/pkv-sync-plugin
        run: |
          set -euo pipefail
          STATE="$(gh release view "$VERSION" --repo "$MIRROR_REPO" --json isDraft --jq .isDraft 2>/dev/null || echo missing)"
          if [ "$STATE" = "false" ]; then
            echo "mirror release $VERSION already published; nothing to do"
            exit 0
          fi
          if [ "$STATE" = "true" ]; then
            echo "deleting leftover draft release $VERSION"
            gh release delete "$VERSION" --repo "$MIRROR_REPO" --yes
          fi
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${MIRROR_REPO}.git" mirror-repo
          git -C mirror-repo rm -rq --ignore-unmatch -- .
          cp -r mirror-content/* mirror-repo/
          git -C mirror-repo config user.name "github-actions[bot]"
          git -C mirror-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C mirror-repo add -A
          if ! git -C mirror-repo diff --cached --quiet; then
            git -C mirror-repo commit -m "chore(release): ${VERSION}"
            git -C mirror-repo push origin HEAD:main
          fi
          if ! git -C mirror-repo rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            git -C mirror-repo tag "${VERSION}"
          fi
          git -C mirror-repo push origin "refs/tags/${VERSION}"
          HEADING="$(grep -m1 -F "## [${VERSION}]" CHANGELOG.md || true)"
          if [ -n "$HEADING" ]; then
            ANCHOR="$(printf '%s' "$HEADING" | sed 's/^## //' | tr -d '[].' | tr ' ' '-' | tr '[:upper:]' '[:lower:]')"
            NOTES="PKV Sync plugin ${VERSION}. Changelog: https://github.com/CyberKurry/pkv-sync/blob/main/CHANGELOG.md#${ANCHOR}"
          else
            NOTES="PKV Sync plugin ${VERSION}. Changelog: https://github.com/CyberKurry/pkv-sync/blob/main/CHANGELOG.md"
          fi
          gh release create "$VERSION" \
            --repo "$MIRROR_REPO" \
            --title "$VERSION" \
            --verify-tag \
            --notes "$NOTES" \
            mirror-repo/main.js mirror-repo/manifest.json mirror-repo/styles.css
