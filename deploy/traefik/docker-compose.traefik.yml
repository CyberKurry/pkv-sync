services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      EVENTS: 1
      NETWORKS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [traefik-proxy]

  traefik:
    image: traefik:v3.0
    command:
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://socket-proxy:2375
      - --providers.docker.exposedbydefault=false
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=admin@example.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
    depends_on: [socket-proxy]
    networks: [traefik-proxy]

  pkv-sync:
    image: ghcr.io/cyberkurry/pkv-sync:latest
    volumes:
      - ./data:/var/lib/pkv-sync
      - ./config.toml:/etc/pkv-sync/config.toml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.pkv.rule=Host(`sync.example.com`)
      - traefik.http.routers.pkv.entrypoints=websecure
      - traefik.http.routers.pkv.tls.certresolver=le
      - traefik.http.services.pkv.loadbalancer.server.port=6710
    networks: [traefik-proxy]

networks:
  traefik-proxy:
