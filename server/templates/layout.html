<!doctype html>
<html lang="{{ t.html_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ t.admin_title }}{% endblock %}</title>
  <script src="/admin/static/admin.js"></script>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body class="admin-body">
  <input id="admin-sidebar-toggle" class="sidebar-toggle" type="checkbox" aria-hidden="true">
  <label class="sidebar-scrim" for="admin-sidebar-toggle" aria-hidden="true"></label>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/admin" class="brand" aria-label="PKV Sync">
        <span class="brand-mark" aria-hidden="true">
          <span class="brand-bracket">[</span><span class="brand-word brand-word-1">PKV</span><span class="brand-slash">/</span><span class="brand-word brand-word-2">SYNC</span><span class="brand-bracket">]</span>
        </span>
      </a>
      <label class="sidebar-close" for="admin-sidebar-toggle" aria-label="Close navigation">
        <svg class="admin-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#x"></use></svg>
      </label>

      <nav class="sidebar-nav" aria-label="Admin navigation">
        <a href="/admin" class="nav-link {% block nav_dashboard %}{% endblock %}">
          <svg class="nav-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#gauge"></use></svg>
          <span>{{ t.dashboard }}</span>
        </a>
        <a href="/admin/users" class="nav-link {% block nav_users %}{% endblock %}">
          <svg class="nav-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#users-round"></use></svg>
          <span>{{ t.users }}</span>
        </a>
        <a href="/admin/vaults" class="nav-link {% block nav_vaults %}{% endblock %}">
          <svg class="nav-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#database"></use></svg>
          <span>{{ t.vaults }}</span>
        </a>
        <a href="/admin/devices" class="nav-link {% block nav_devices %}{% endblock %}">
          <svg class="nav-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#server"></use></svg>
          <span>{{ t.devices }}</span>
        </a>
        <a href="/admin/invites" class="nav-link {% block nav_invites %}{% endblock %}">
          <svg class="nav-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#key-round"></use></svg>
          <span>{{ t.invites }}</span>
        </a>
        <a href="/admin/activity" class="nav-link {% block nav_activity %}{% endblock %}">
          <svg class="nav-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#activity"></use></svg>
          <span>{{ t.activity }}</span>
        </a>
        <a href="/admin/settings" class="nav-link {% block nav_settings %}{% endblock %}">
          <svg class="nav-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#settings"></use></svg>
          <span>{{ t.settings }}</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <form class="language-switch sidebar-control" method="get" action="/admin/language">
          <input type="hidden" name="next" value="/admin">
          <label for="admin-language-select">{{ t.language }}</label>
          <select id="admin-language-select" name="lang" data-language-select data-next="/admin">
            <option value="en" {% if t.html_lang == "en" %}selected{% endif %}>English</option>
            <option value="zh-CN" {% if t.html_lang == "zh-CN" %}selected{% endif %}>简体中文</option>
            <option value="zh-Hant" {% if t.html_lang == "zh-Hant" %}selected{% endif %}>繁體中文</option>
            <option value="ja" {% if t.html_lang == "ja" %}selected{% endif %}>日本語</option>
            <option value="ko" {% if t.html_lang == "ko" %}selected{% endif %}>한국어</option>
          </select>
        </form>
        <div class="theme-switch sidebar-control">
          <label for="admin-theme-toggle">{{ t.theme }}</label>
          <button
            id="admin-theme-toggle"
            class="theme-toggle-button"
            type="button"
            data-theme-toggle
            data-theme-mode="auto"
            data-label-theme="{{ t.theme }}"
            data-label-auto="{{ t.theme_auto }}"
            data-label-light="{{ t.theme_light }}"
            data-label-dark="{{ t.theme_dark }}"
            aria-label="{{ t.theme }}: {{ t.theme_auto }}"
            title="{{ t.theme }}: {{ t.theme_auto }}"
          >
            <svg class="theme-toggle-icon admin-icon" aria-hidden="true"><use data-theme-icon-use href="/admin/static/lucide-icons.svg#monitor"></use></svg>
            <span data-theme-label>{{ t.theme_auto }}</span>
          </button>
        </div>
        <div class="user-card">
          <span class="avatar">A</span>
          <span class="user-meta"><strong>{{ t.admin }}</strong><small>admin@pkv.local</small></span>
          <form method="post" action="/admin/logout" class="inline">
            <button class="icon-button" aria-label="{{ t.logout }}" title="{{ t.logout }}">
              <svg class="admin-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#log-out"></use></svg>
            </button>
          </form>
        </div>
      </div>
    </aside>

    <section class="main-panel">
      <header class="page-bar">
        <div class="page-title-row">
          <label class="mobile-menu-button" for="admin-sidebar-toggle" aria-label="Open navigation">
            <svg class="admin-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#menu"></use></svg>
          </label>
          <h1>{% block page_title %}{{ t.admin_title }}{% endblock %}</h1>
        </div>
        <div class="page-actions">{% block header_actions %}{% endblock %}</div>
      </header>
      <main class="page-content">
        {% block content %}{% endblock %}
      </main>
      <footer class="colophon" data-pkv-colophon>
        <span class="colophon-mark">PKV/SYNC</span>
        <span class="colophon-dot">·</span>
        <span class="colophon-now" data-pkv-colophon-now></span>
      </footer>
    </section>
  </div>
</body>
</html>
