<!doctype html>
<html lang="{{ t.html_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t.setup_title }}</title>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <span class="brand-mark login-mark" aria-hidden="true">
        <svg class="admin-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#refresh-cw"></use></svg>
      </span>
      <h1>PKV Sync</h1>
      <p class="login-subtitle">{{ t.setup_description }}</p>
      <p class="login-language"><a href="/admin/language/en?next=/setup">English</a> | <a href="/admin/language/zh-CN?next=/setup">简体中文</a> | <a href="/admin/language/zh-Hant?next=/setup">繁體中文</a> | <a href="/admin/language/ja?next=/setup">日本語</a> | <a href="/admin/language/ko?next=/setup">한국어</a></p>
      {% if let Some(e) = error %}<p class="error">{{ e }}</p>{% endif %}
      <form method="post" action="/setup" class="login-form">
        <label>{{ t.setup_username_label }} <input name="username" autocomplete="username" value="{{ username_value }}" placeholder="admin"></label>
        <label>{{ t.setup_password_label }} <input name="password" type="password" autocomplete="new-password" placeholder="Password"></label>
        <label>{{ t.setup_confirm_label }} <input name="confirm" type="password" autocomplete="new-password" placeholder="Password"></label>
        <button type="submit" class="primary full-width"><svg class="admin-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#log-in"></use></svg>{{ t.setup_submit }}</button>
      </form>
      <p class="login-footnote">PKV Sync v{{ version }}</p>
    </section>
  </main>
</body>
</html>
