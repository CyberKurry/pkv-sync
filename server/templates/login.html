<!doctype html>
<html lang="{{ t.html_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t.login_title }}</title>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <span class="brand-mark login-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M17 1v6h-6"/><path d="M7 23v-6h6"/><path d="M20.5 9A8.5 8.5 0 0 0 6 4.5L3 7.5"/><path d="M3.5 15A8.5 8.5 0 0 0 18 19.5l3-3"/></svg>
      </span>
      <h1>PKV Sync</h1>
      <p class="login-subtitle">Sign in to your admin panel</p>
      <p class="login-language"><a href="/admin/language/en?next=/admin/login">English</a> | <a href="/admin/language/zh-CN?next=/admin/login">简体中文</a></p>
      {% if let Some(e) = error %}<p class="error">{{ e }}</p>{% endif %}
      <form method="post" action="/admin/login" class="login-form">
        <label>{{ t.username }} <input name="username" autocomplete="username" placeholder="Enter your username"></label>
        <label>{{ t.password }} <input name="password" type="password" autocomplete="current-password" placeholder="••••••••"></label>
        <button type="submit" class="primary full-width">{{ t.login }}</button>
      </form>
      <p class="login-footnote">Deployment key required for first setup</p>
    </section>
    <p class="login-version">PKV Sync v0.1.2</p>
  </main>
</body>
</html>
