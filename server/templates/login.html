<!doctype html>
<html lang="{{ t.html_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t.login_title }}</title>
  <script src="/admin/static/admin.js"></script>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <span class="brand-mark login-mark" aria-hidden="true">
        <span class="brand-bracket">[</span><span class="brand-word">PKV</span><span class="brand-slash">/</span><span class="brand-word">SYNC</span><span class="brand-bracket">]</span>
      </span>
      <h1>PKV Sync</h1>
      <p class="login-subtitle">{{ t.login_subtitle }}</p>
      <div class="login-controls">
        <form class="login-language sidebar-control" method="get" action="/admin/language">
          <input type="hidden" name="next" value="/admin/login">
          <label for="login-language-select">{{ t.language }}</label>
          <select id="login-language-select" name="lang" data-language-select data-next="/admin/login">
            <option value="en" {% if t.html_lang == "en" %}selected{% endif %}>English</option>
            <option value="zh-CN" {% if t.html_lang == "zh-CN" %}selected{% endif %}>简体中文</option>
            <option value="zh-Hant" {% if t.html_lang == "zh-Hant" %}selected{% endif %}>繁體中文</option>
            <option value="ja" {% if t.html_lang == "ja" %}selected{% endif %}>日本語</option>
            <option value="ko" {% if t.html_lang == "ko" %}selected{% endif %}>한국어</option>
          </select>
        </form>
        <div class="login-theme sidebar-control">
          <label for="login-theme-toggle">{{ t.theme }}</label>
          <button
            id="login-theme-toggle"
            class="theme-toggle-button"
            type="button"
            data-theme-toggle
            data-theme-mode="auto"
            data-label-theme="{{ t.theme }}"
            data-label-auto="{{ t.theme_auto }}"
            data-label-light="{{ t.theme_light }}"
            data-label-dark="{{ t.theme_dark }}"
            aria-label="{{ t.theme }}: {{ t.theme_auto }}"
            title="{{ t.theme }}: {{ t.theme_auto }}"
          >
            <svg class="theme-toggle-icon admin-icon" aria-hidden="true"><use data-theme-icon-use href="/admin/static/lucide-icons.svg#monitor"></use></svg>
            <span data-theme-label>{{ t.theme_auto }}</span>
          </button>
        </div>
      </div>
      {% if let Some(m) = success %}<p class="success">{{ m }}</p>{% endif %}
      {% if let Some(e) = error %}<p class="error">{{ e }}</p>{% endif %}
      {% if setup_required %}
      <p class="error">{{ t.setup_required }}</p>
      <a class="primary full-width" href="/setup"><svg class="admin-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#arrow-right"></use></svg>{{ t.setup_begin }}</a>
      {% else %}
      <form method="post" action="/admin/login" class="login-form">
        <input name="login_csrf" type="hidden" value="{{ login_csrf }}">
        <label>{{ t.username }} <input name="username" type="text" autocomplete="username" value="{{ username_value }}" placeholder="{{ t.username_placeholder }}"></label>
        <label>{{ t.password }} <input name="password" type="password" autocomplete="current-password" placeholder="{{ t.password_placeholder }}"></label>
        <button type="submit" class="primary full-width"><svg class="admin-icon" aria-hidden="true"><use href="/admin/static/lucide-icons.svg#log-in"></use></svg>{{ t.login }}</button>
      </form>
      {% endif %}
      <p class="login-footnote">PKV Sync v{{ version }}</p>
    </section>
  </main>
</body>
</html>
