<!doctype html>
<html lang="{{ t.html_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t.login_title }}</title>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body class="login-body">
  <main class="login-card">
    <h1>{{ t.admin_title }}</h1>
    <p><a href="/admin/language/en?next=/admin/login">English</a> | <a href="/admin/language/zh-CN?next=/admin/login">简体中文</a></p>
    {% if let Some(e) = error %}<p class="error">{{ e }}</p>{% endif %}
    <form method="post" action="/admin/login">
      <label>{{ t.username }} <input name="username" autocomplete="username"></label>
      <label>{{ t.password }} <input name="password" type="password" autocomplete="current-password"></label>
      <button type="submit">{{ t.login }}</button>
    </form>
  </main>
</body>
</html>
