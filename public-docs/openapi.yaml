openapi: 3.0.3
info:
  title: PKV Sync API
  version: 0.8.2
  license:
    name: AGPL-3.0-only
  contact:
    name: cyberkurry
  description: |
    HTTP API for PKV Sync clients and admin integrations.

    All `/api/*` routes are protected by the deployment key middleware and the
    plugin User-Agent guard in the production server stack. Authenticated user
    and admin routes additionally require a bearer device token. Production
    responses include clickjacking, MIME sniffing, referrer, and CSP headers;
    HSTS is emitted when `public_host` is configured.
servers:
  - url: https://sync.example.com
security:
  - DeploymentKey: []
    PluginUserAgent: []
tags:
  - name: Health
  - name: Config
  - name: Auth
  - name: Me
  - name: Vaults
  - name: Plugin
  - name: Admin
  - name: Metrics
components:
  securitySchemes:
    DeploymentKey:
      type: apiKey
      in: header
      name: X-PKVSync-Deployment-Key
      description: Deployment key distributed through the server share URL.
    PluginUserAgent:
      type: apiKey
      in: header
      name: User-Agent
      description: Must use the PKV Sync plugin User-Agent format accepted by the server.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: pks_token
  parameters:
    VaultId:
      in: path
      name: vault_id
      required: true
      schema:
        type: string
      description: Vault UUID-like id without dashes.
    Commit:
      in: path
      name: commit
      required: true
      schema:
        type: string
      description: Git commit hash.
    BlobHash:
      in: path
      name: hash
      required: true
      schema:
        type: string
        pattern: '^[0-9a-f]{64}$'
      description: SHA-256 content hash.
    TokenId:
      in: path
      name: token_id
      required: true
      schema:
        type: string
    UserId:
      in: path
      name: user_id
      required: true
      schema:
        type: string
    InviteCode:
      in: path
      name: code
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing, invalid, revoked, or expired bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated user does not have permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found, or deployment key/User-Agent rejected by the production stack
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Request conflicts with current server state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: Request rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    HealthResponse:
      type: object
      required: [status, uptime_seconds]
      properties:
        status:
          type: string
          enum: [ok]
        uptime_seconds:
          type: integer
          format: int64
          minimum: 0
    Config:
      type: object
      required:
        - server_name
        - version
        - registration
        - max_file_size
        - supported_text_extensions
        - capabilities
        - push_debounce_ms
        - inline_content_max_bytes
      properties:
        server_name:
          type: string
        version:
          type: string
        registration:
          type: string
          enum: [disabled, invite_only, open]
        max_file_size:
          type: integer
          format: int64
          minimum: 0
        supported_text_extensions:
          type: array
          items:
            type: string
        capabilities:
          $ref: '#/components/schemas/ServerCapabilities'
        push_debounce_ms:
          type: integer
          format: int32
          minimum: 0
          description: |
            Server-recommended debounce in milliseconds between a settled
            local edit and the plugin push. Plugins should mirror this into
            their local debounce on each config refresh.
        inline_content_max_bytes:
          type: integer
          format: int32
          minimum: 0
          maximum: 65536
          description: |
            Maximum text content size that the server will inline in an SSE
            event. Files above this size still trigger a `text_ref` event;
            the plugin pulls them via the normal path.
    ServerCapabilities:
      type: object
      required: [history, diff, sse, git_smart_http]
      properties:
        history:
          type: boolean
        diff:
          type: boolean
        sse:
          type: boolean
          description: Server-Sent Events stream for real-time push notifications.
        git_smart_http:
          type: boolean
          description: |
            Whether read-only `git clone` over `/git/{vault_id}/...` is
            available. The authenticated `/api/config` endpoint reports
            `true` only when both the admin toggle is enabled and the
            `git` binary is present on the server.
    PluginManifest:
      type: object
      required:
        - version
        - main_js_url
        - main_js_sha256
        - manifest_json_url
        - manifest_json_sha256
        - styles_css_url
        - styles_css_sha256
      properties:
        version:
          type: string
          description: Bundled Obsidian plugin version.
        main_js_url:
          type: string
          format: uri
          description: |
            Authenticated download URL. In the production stack this is anchored
            to configured `public_host` when set; the server does not trust
            unverified `X-Forwarded-Proto` for this origin.
        main_js_sha256:
          type: string
          pattern: '^[0-9a-f]{64}$'
        manifest_json_url:
          type: string
          format: uri
          description: Authenticated download URL for bundled `manifest.json`.
        manifest_json_sha256:
          type: string
          pattern: '^[0-9a-f]{64}$'
        styles_css_url:
          type: string
          format: uri
          nullable: true
          description: Authenticated download URL for bundled `styles.css`.
        styles_css_sha256:
          type: string
          pattern: '^[0-9a-f]{64}$'
          nullable: true
    LoginRequest:
      type: object
      required: [username, password, device_id, device_name]
      properties:
        username:
          $ref: '#/components/schemas/Username'
        password:
          type: string
          format: password
        device_id:
          type: string
          minLength: 1
          maxLength: 128
        device_name:
          type: string
          minLength: 1
          maxLength: 64
    RegisterRequest:
      allOf:
        - $ref: '#/components/schemas/LoginRequest'
        - type: object
          properties:
            invite_code:
              type: string
              nullable: true
    AuthResponse:
      type: object
      required: [token, user_id, username, is_admin]
      properties:
        token:
          type: string
          description: Plaintext bearer token. It is shown only once.
          example: pks_...
        user_id:
          type: string
        username:
          type: string
        is_admin:
          type: boolean
    Username:
      type: string
      minLength: 3
      maxLength: 32
      pattern: '^[A-Za-z0-9_.-]+$'
    UserView:
      type: object
      required: [id, username, is_admin, is_active, created_at, last_login_at]
      properties:
        id:
          type: string
        username:
          type: string
        is_admin:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: integer
          format: int64
        last_login_at:
          type: integer
          format: int64
          nullable: true
    MeResponse:
      type: object
      required: [user_id, username, is_admin, vaults]
      properties:
        user_id:
          type: string
        username:
          type: string
        is_admin:
          type: boolean
        vaults:
          type: array
          items:
            $ref: '#/components/schemas/Vault'
    TokenView:
      type: object
      required: [id, device_id, device_name, created_at, last_used_at, current]
      properties:
        id:
          type: string
        device_id:
          type: string
        device_name:
          type: string
        created_at:
          type: integer
          format: int64
        last_used_at:
          type: integer
          format: int64
          nullable: true
        current:
          type: boolean
    AdminTokenView:
      type: object
      required:
        - id
        - user_id
        - device_id
        - device_name
        - created_at
        - expires_at
        - last_used_at
        - revoked_at
      properties:
        id:
          type: string
        user_id:
          type: string
        device_id:
          type: string
        device_name:
          type: string
        created_at:
          type: integer
          format: int64
        expires_at:
          type: integer
          format: int64
        last_used_at:
          type: integer
          format: int64
          nullable: true
        revoked_at:
          type: integer
          format: int64
          nullable: true
    Vault:
      type: object
      required:
        - id
        - user_id
        - name
        - created_at
        - last_sync_at
        - size_bytes
        - file_count
      properties:
        id:
          type: string
        user_id:
          type: string
        name:
          type: string
        created_at:
          type: integer
          format: int64
        last_sync_at:
          type: integer
          format: int64
          nullable: true
        size_bytes:
          type: integer
          format: int64
        file_count:
          type: integer
          format: int64
    VaultSettings:
      type: object
      required: [extra_sync_globs]
      properties:
        extra_sync_globs:
          type: array
          description: Per-vault allowlist for hidden paths such as selected `.obsidian` files.
          items:
            type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
    CreateVaultRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          description: Must not be empty after trimming and must not contain path separators.
    UploadCheckRequest:
      type: object
      required: [blob_hashes]
      properties:
        blob_hashes:
          type: array
          items:
            type: string
            pattern: '^[0-9a-f]{64}$'
    UploadCheckResponse:
      type: object
      required: [missing]
      properties:
        missing:
          type: array
          items:
            type: string
            pattern: '^[0-9a-f]{64}$'
    PushChange:
      oneOf:
        - $ref: '#/components/schemas/TextPushChange'
        - $ref: '#/components/schemas/BlobPushChange'
        - $ref: '#/components/schemas/DeletePushChange'
      discriminator:
        propertyName: kind
    TextPushChange:
      type: object
      required: [kind, path, content]
      properties:
        kind:
          type: string
          enum: [text]
        path:
          type: string
        content:
          type: string
    BlobPushChange:
      type: object
      required: [kind, path, blob_hash, size]
      properties:
        kind:
          type: string
          enum: [blob]
        path:
          type: string
        blob_hash:
          type: string
          pattern: '^[0-9a-f]{64}$'
        size:
          type: integer
          format: int64
          minimum: 0
        mime:
          type: string
          nullable: true
    DeletePushChange:
      type: object
      required: [kind, path]
      properties:
        kind:
          type: string
          enum: [delete]
        path:
          type: string
    PushRequest:
      type: object
      required: [changes]
      properties:
        changes:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/PushChange'
        device_name:
          type: string
          nullable: true
    PushResponse:
      type: object
      required: [new_commit, files_changed]
      properties:
        new_commit:
          type: string
        files_changed:
          type: integer
          minimum: 0
    RestoreVaultRequest:
      type: object
      required: [commit, confirm_vault_name]
      properties:
        commit:
          type: string
        confirm_vault_name:
          type: string
          description: Must exactly match the current vault name.
    RollbackResult:
      type: object
      required: [from_commit, to_commit, rolled_back]
      properties:
        from_commit:
          type: string
          nullable: true
        to_commit:
          type: string
        rolled_back:
          type: boolean
    StateResponse:
      type: object
      required: [current_head, changed_since]
      properties:
        current_head:
          type: string
          nullable: true
        changed_since:
          type: boolean
    PullFile:
      type: object
      required: [path, file_type, size, content_inline, blob_hash]
      properties:
        path:
          type: string
        file_type:
          type: string
          enum: [text, blob]
        size:
          type: integer
          format: int64
          minimum: 0
        content_inline:
          type: string
          nullable: true
          description: Present for text files up to 64 KiB; null when the client must call the file endpoint.
        blob_hash:
          type: string
          nullable: true
          pattern: '^[0-9a-f]{64}$'
    PullResponse:
      type: object
      required: [from, to, added, modified, deleted]
      properties:
        from:
          type: string
          nullable: true
        to:
          type: string
          nullable: true
        added:
          type: array
          items:
            $ref: '#/components/schemas/PullFile'
        modified:
          type: array
          items:
            $ref: '#/components/schemas/PullFile'
        deleted:
          type: array
          items:
            type: string
    CommitSummary:
      type: object
      required: [commit, parent, message, timestamp, author_device]
      properties:
        commit:
          type: string
        parent:
          type: string
          nullable: true
        message:
          type: string
        timestamp:
          type: integer
          format: int64
        author_device:
          type: string
          nullable: true
        change_type:
          $ref: '#/components/schemas/ChangeType'
    ChangeType:
      type: string
      enum: [added, modified, deleted]
    CommitChange:
      type: object
      required: [path, change_type, old_path, binary]
      properties:
        path:
          type: string
        change_type:
          $ref: '#/components/schemas/ChangeType'
        old_path:
          type: string
          nullable: true
        binary:
          type: boolean
    CommitDetail:
      type: object
      required: [commit, parent, message, timestamp, author_device, changes]
      properties:
        commit:
          type: string
        parent:
          type: string
          nullable: true
        message:
          type: string
        timestamp:
          type: integer
          format: int64
        author_device:
          type: string
          nullable: true
        changes:
          type: array
          items:
            $ref: '#/components/schemas/CommitChange'
    UnifiedDiff:
      type: object
      required: [from, to, path, binary, truncated, patch]
      properties:
        from:
          type: string
          nullable: true
        to:
          type: string
          nullable: true
        path:
          type: string
        binary:
          type: boolean
        truncated:
          type: boolean
          description: True when the patch text is truncated to the 1 MiB preview limit.
        patch:
          type: string
          description: Unified diff text for text files; empty for binary files.
    CreateAdminUserRequest:
      type: object
      required: [username, password]
      properties:
        username:
          $ref: '#/components/schemas/Username'
        password:
          type: string
          format: password
        is_admin:
          type: boolean
          nullable: true
    PatchAdminUserRequest:
      type: object
      properties:
        is_active:
          type: boolean
          nullable: true
        is_admin:
          type: boolean
          nullable: true
        password:
          type: string
          format: password
          nullable: true
    Invite:
      type: object
      required:
        - code
        - created_by
        - created_at
        - expires_at
        - used_at
        - used_by
      properties:
        code:
          type: string
        created_by:
          type: string
        created_at:
          type: integer
          format: int64
        expires_at:
          type: integer
          format: int64
          nullable: true
        used_at:
          type: integer
          format: int64
          nullable: true
        used_by:
          type: string
          nullable: true
    CreateInviteRequest:
      type: object
      properties:
        expires_at:
          type: integer
          format: int64
          nullable: true
    SystemResponse:
      type: object
      required: [users, vaults]
      properties:
        users:
          type: integer
          format: int64
        vaults:
          type: integer
          format: int64
    GcReport:
      type: object
      required: [deleted, kept_referenced, candidates]
      properties:
        deleted:
          type: integer
          minimum: 0
        kept_referenced:
          type: integer
          minimum: 0
        candidates:
          type: integer
          minimum: 0
paths:
  /metrics:
    get:
      tags: [Metrics]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: Prometheus metrics for administrators
      description: |
        Returns Prometheus text exposition when the `enable_metrics` runtime
        setting is enabled. Production deployments still require the deployment
        key middleware, accepted PKV Sync plugin User-Agent, and an admin bearer
        token. When metrics are disabled, the endpoint returns `404`.
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain; version=0.0.4; charset=utf-8:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/config:
    get:
      tags: [Config]
      summary: Server capability discovery
      responses:
        '200':
          description: Server configuration visible to clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/plugin-manifest:
    get:
      tags: [Plugin]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: Bundled Obsidian plugin manifest for self-update
      description: |
        Returns the Obsidian plugin version bundled with this PKV Sync server,
        plus authenticated download URLs and SHA-256 hashes for plugin assets.
        Plugins use this endpoint before falling back to GitHub releases. When
        `[server].public_host` is configured, asset URLs use that external host
        and do not rely on untrusted forwarded-proto request headers.
      responses:
        '200':
          description: Bundled plugin manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginManifest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/plugin-assets/main.js:
    get:
      tags: [Plugin]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: Bundled Obsidian plugin main.js
      responses:
        '200':
          description: JavaScript plugin bundle
          content:
            application/javascript:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/plugin-assets/manifest.json:
    get:
      tags: [Plugin]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: Bundled Obsidian plugin manifest.json
      responses:
        '200':
          description: Obsidian plugin manifest
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/plugin-assets/styles.css:
    get:
      tags: [Plugin]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: Bundled Obsidian plugin styles.css
      responses:
        '200':
          description: Obsidian plugin stylesheet
          content:
            text/css:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and issue a device token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Login rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register and issue a device token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          description: Registration rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/me:
    get:
      tags: [Me]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: Current user and vaults
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/me/password:
    post:
      tags: [Me]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: Change current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/me/logout:
    post:
      tags: [Me]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: Revoke current device token
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/me/tokens:
    get:
      tags: [Me]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: List current user's active device tokens
      responses:
        '200':
          description: Token list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TokenView'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/me/tokens/{token_id}:
    delete:
      tags: [Me]
      security:
        - DeploymentKey: []
          PluginUserAgent: []
          BearerAuth: []
      summary: Revoke one of the current user's device tokens
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '204':
          description: Token revoked
        '401':
